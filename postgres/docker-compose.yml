version: '3.8'

services:

  # ── PostgreSQL 16 ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: redis-demo-postgres
    environment:
      POSTGRES_DB: redisdemo
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql  # seed data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d redisdemo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-demo-redis
    command: redis-server --requirepass secret123 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret123", "ping"]
      interval: 5s
      retries: 3

  # ── Redis Commander (GUI on :8081) ────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379:0:secret123
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  # ── pgAdmin 4 (GUI on :5050) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data: