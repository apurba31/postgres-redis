spring:
  application:
    name: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/redisdemo
    username: app
    password: apppassword
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    show-sql: true                  # IMPORTANT: lets us see SQL disappear on cache hits
    hibernate:
      ddl-auto: create-drop         # for learning only — creates tables on start
    properties:
      hibernate.format_sql: true

  data:
    redis:                          # note: spring.data.redis — NOT spring.redis
      host: localhost
      port: 6379
      password: secret123
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          min-idle: 1

  cache:
    type: redis

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: DEBUG        # proves cache misses vs hits via SQL log presence/absence
    com.redis.postgres: DEBUG
